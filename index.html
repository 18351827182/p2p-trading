<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P交易</title>
    <style>
        /* 这里可以放一些简单的样式，让页面不至于空白 */
        body { font-family: sans-serif; padding: 20px; }
        .ad-item { border: 1px solid #ccc; margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>
    <h1>广告列表</h1>
    <div id="ad-list">加载中...</div>  <!-- 注意这个容器 -->

    <script>
        async function loadAds() {
            try {
                const response = await fetch('https://mianfei.baobaolian.dpdns.org/api/ads');
                const ads = await response.json();
                const container = document.getElementById('ad-list');
                if (!container) {
                    console.error('找不到广告列表容器');
                    return;
                }
                container.innerHTML = ''; // 清空
                if (ads.length === 0) {
                    container.innerHTML = '<p>暂无广告</p>';
                    return;
                }
                ads.forEach(ad => {
                    const adElement = document.createElement('div');
                    adElement.className = 'ad-item';
                    adElement.innerHTML = `
                        <div>卖家：${ad.seller_name}</div>
                        <div>支付方式：${ad.payment_method}</div>
                        <div>价格：${ad.price}</div>
                        <div>限额：${ad.min_limit} - ${ad.max_limit}</div>
                        <div>可用数量：${ad.available_amount}</div>
                        <button>购买</button>
                    `;
                    container.appendChild(adElement);
                });
            } catch (error) {
                console.error('加载广告失败', error);
                document.getElementById('ad-list').innerHTML = '<p>加载失败，请稍后重试</p>';
            }
        }

        window.addEventListener('DOMContentLoaded', loadAds);
    </script>
</body>
</html>
